name: Build consolidated RSS

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: feed-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate feed.xml
        run: |
          python scripts/aggregate.py

      - name: Validate RSS XML
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse("feed.xml")
          print("XML OK")
          PY

      - name: Publish to gh-pages
        run: |
          set -e

          # Stash the freshly generated feed from main
          mkdir -p /tmp/publish
          cp feed.xml /tmp/publish/feed.xml

          # Switch to (or create) gh-pages branch
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages

          # Clear the branch contents
          git rm -rf . || true

          # Publish: multiple stable paths (avoid querystring/cache issues)
          cp /tmp/publish/feed.xml ./feed.xml
          cp /tmp/publish/feed.xml ./feed-alt.xml

          # Commit and push
          git add feed.xml feed-alt.xml
          git config user.name "rss-aggregator-bot"
          git config user.email "rss-aggregator-bot@users.noreply.github.com"
          git commit -m "Update feed" || echo "No changes to commit"
          git push --force-with-lease origin gh-pages
